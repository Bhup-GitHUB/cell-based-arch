apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell1-db
  namespace: cells
  labels:
    app: cell-db
    cell: cell-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cell-db
      cell: cell-1
  template:
    metadata:
      labels:
        app: cell-db
        cell: cell-1
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              value: app
            - name: POSTGRES_DB
              value: cell1
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cell1-db
  namespace: cells
  labels:
    app: cell-db
    cell: cell-1
spec:
  selector:
    app: cell-db
    cell: cell-1
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell1-app
  namespace: cells
  labels:
    app: cell-app
    cell: cell-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cell-app
      cell: cell-1
  template:
    metadata:
      labels:
        app: cell-app
        cell: cell-1
    spec:
      containers:
        - name: cell
          image: cell-based-arch/cell:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          env:
            - name: CELL_ID
              value: cell-1
            - name: APP_VERSION
              value: v1
            - name: CELL_FAIL
              value: "false"
            - name: DATABASE_URL
              value: postgres://app:app@cell1-db:5432/cell1?sslmode=disable
            - name: PORT
              value: "9000"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cell1-app
  namespace: cells
  labels:
    app: cell-app
    cell: cell-1
spec:
  selector:
    app: cell-app
    cell: cell-1
  ports:
    - port: 9000
      targetPort: 9000
